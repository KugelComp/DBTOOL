<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - DB Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-dark: #0f172a;
            --surface-dark: #1e293b;
            --text-light: #f8fafc;
            --text-gray: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
            --border: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
        }

        .nav-link {
            color: var(--text-gray);
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
        }

        .nav-link:hover {
            color: var(--text-light);
        }

        .card {
            background: var(--surface-dark);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 24px;
            margin-bottom: 24px;
        }

        h2 {
            margin-top: 0;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th,
        td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--text-gray);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 0.85rem;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-gray);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .flex-row {
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }

        /* Modal for Reset Password */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface-dark);
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            border: 1px solid var(--border);
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <a href="/" class="logo">DB Tool Admin</a>
            <nav>
                <a href="/" class="nav-link">Home</a>
                <a href="/logout" class="nav-link">Logout</a>
            </nav>
        </div>

        <!-- Add User Section -->
        <div class="card">
            <h2>Add New User</h2>
            <div class="flex-row">
                <div class="form-group" style="flex: 1;">
                    <label>Username</label>
                    <input type="text" id="newUsername" placeholder="Enter username">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Password</label>
                    <input type="password" id="newPassword" placeholder="Enter password">
                </div>
                <div class="form-group">
                    <button class="btn btn-primary" onclick="addUser()">Create User</button>
                </div>
            </div>
        </div>

        <!-- Users List -->
        <div class="card">
            <h2>System Users</h2>
            <table>
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Created At</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTable">
                    {% for u in users %}
                    <tr>
                        <td>{{ u.username }}</td>
                        <td>{{ u.created_at }}</td>
                        <td>
                            {% if u.username != 'admin' %}
                            <button class="btn btn-primary btn-sm" onclick="openResetModal('{{ u.username }}')">Reset
                                Pass</button>
                            <button class="btn btn-danger btn-sm"
                                onclick="deleteUser('{{ u.username }}')">Delete</button>
                            {% else %}
                            <span style="color: var(--text-gray); font-size: 0.85rem;">(System Admin)</span>
                            {% endif %}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <!-- Reset Password Modal -->
    <div id="resetModal" class="modal">
        <div class="modal-content">
            <h3>Reset Password for <span id="resetTarget" style="color: var(--primary)"></span></h3>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="resetNewPass">
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
                <button class="btn btn-danger" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="confirmReset()">Save New Password</button>
            </div>
        </div>
    </div>

    <script>
        let currentResetUser = null;

        async function addUser() {
            const user = document.getElementById('newUsername').value;
            const pass = document.getElementById('newPassword').value;

            if (!user || !pass) return alert("Please fill both username and password");

            try {
                const res = await fetch('/users/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await res.json();
                if (data.success) location.reload();
                else alert("Error: " + data.error);
            } catch (e) { alert("Failed to add user"); }
        }

        async function deleteUser(username) {
            if (!confirm(`Are you sure you want to delete user '${username}'?`)) return;

            try {
                const res = await fetch('/users/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username })
                });
                const data = await res.json();
                if (data.success) location.reload();
                else alert("Error: " + data.error);
            } catch (e) { alert("Failed to delete user"); }
        }

        function openResetModal(username) {
            currentResetUser = username;
            document.getElementById('resetTarget').innerText = username;
            document.getElementById('resetModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('resetModal').classList.remove('active');
            document.getElementById('resetNewPass').value = '';
            currentResetUser = null;
        }

        async function confirmReset() {
            if (!currentResetUser) return;
            const newPass = document.getElementById('resetNewPass').value;
            if (!newPass) return alert("Enter a new password");

            try {
                const res = await fetch('/users/reset-password', {
                    method: 'POST',
                    headers: csrfHeaders(),
                    body: JSON.stringify({ username: currentResetUser, new_password: newPass })
                });
                const data = await res.json();
                if (data.success) {
                    alert("Password updated successfully");
                    closeModal();
                }
                else alert("Error: " + data.error);
            } catch (e) { alert("Failed to reset password"); }
        }
    </script>

</body>

</html>
